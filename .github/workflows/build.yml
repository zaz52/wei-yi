name: WeiYi Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_OPT_LEVEL: "1"
      WEI_YI_RELEASE_BASE_URL: "https://github.com/zaz52/wei-yi/releases/latest/download"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release notes
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          New-Item -ItemType Directory -Force -Path release-github | Out-Null
          node scripts/release-notes.mjs $version --out release-github/release-notes.txt

      - name: Build Tauri installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles nsis

      - name: Prepare WeiYi release assets
        if: github.event_name == 'push'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $installer = Get-ChildItem $bundleDir -File -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not found."
          }

          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            npx tauri signer sign $installer.FullName
          }
          if (-not (Test-Path $signaturePath)) {
            throw "Windows installer signature was not generated: $signaturePath"
          }

          $releaseDir = "release-github"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $assetName = "WeiYi_$($version)_windows_X64$($installer.Extension)"
          $assetPath = Join-Path $releaseDir $assetName
          $assetSignaturePath = "$assetPath.sig"
          Copy-Item $installer.FullName $assetPath -Force
          Copy-Item $signaturePath $assetSignaturePath -Force

          $notesPath = Join-Path $releaseDir "release-notes.txt"
          if (-not (Test-Path $notesPath)) {
            node scripts/release-notes.mjs $version --out $notesPath
          }
          $notes = Get-Content -Path $notesPath -Raw -Encoding utf8
          $signature = (Get-Content $signaturePath -Raw).Trim()

          $latest = [ordered]@{
            version = $version
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ", [System.Globalization.CultureInfo]::InvariantCulture)
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = "$env:WEI_YI_RELEASE_BASE_URL/$assetName"
              }
            }
          }

          $latestPath = Join-Path $releaseDir "latest.json"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText((Join-Path (Get-Location) $latestPath), ($latest | ConvertTo-Json -Depth 5), $utf8NoBom)

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $notesPath = "release-github/release-notes.txt"
          if (-not (gh release view $tag 2>$null)) {
            gh release create $tag --title "唯一 $tag" --notes-file $notesPath --verify-tag
          }
          gh release edit $tag --title "唯一 $tag" --notes-file $notesPath
          $oldAssets = gh release view $tag --json assets --jq '.assets[].name' |
            Where-Object { $_ -like 'QMaiWrite_*' }
          foreach ($asset in $oldAssets) {
            gh release delete-asset $tag $asset -y
          }
          gh release upload $tag `
            release-github/WeiYi_*_windows_X64.exe `
            release-github/WeiYi_*_windows_X64.exe.sig `
            release-github/latest.json `
            release-github/release-notes.txt `
            --clobber

      - name: Upload workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: weiyi-windows-x64
          path: |
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/nsis/*.exe.sig
          if-no-files-found: warn
          retention-days: 14
